<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>论文生成系统 · 管理员</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800&family=Varela+Round&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <div class="global-role-switch" aria-label="角色切换">
    <span>当前角色</span>
    <a class="role-chip active" href="index.html">管理员</a>
    <a class="role-chip" href="teacher-review.html">教师</a>
    <a class="role-chip" href="student-placeholder.html">学生</a>
  </div>
  <style>
    .global-role-switch{position:fixed;right:28px;top:18px;z-index:9999;display:flex;align-items:center;gap:5px;padding:5px 6px 5px 12px;background:rgba(255,255,255,.94);border:1px solid #deddd8;border-radius:999px;box-shadow:0 5px 18px rgba(30,35,31,.08);font:12px/1.4 "Microsoft YaHei",sans-serif;color:#777}
    .global-role-switch .role-chip{padding:6px 10px;border-radius:999px;text-decoration:none;color:#555;font-weight:600}
    .global-role-switch .role-chip:hover{background:#f1f3f0}.global-role-switch .role-chip.active{background:#4f776a;color:#fff}
  </style>
  <div id="app">
    <div class="notion-layout">
      <!-- 内部侧边栏 -->
      <aside class="inner-sidebar">
        <div class="sidebar-header">
          <div class="logo-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          </div>
          <div class="logo-text">
            <div class="logo-title">论文模板管理</div>
            <div class="logo-sub">管理设置</div>
          </div>
        </div>

        <nav class="sidebar-nav">
          <div class="nav-group">管理员功能</div>
          <a class="nav-item" href="#/colleges" data-route="/colleges">
            学院管理
          </a>
          <a class="nav-item" href="#/templates" data-route="/templates">
            模板列表
          </a>
        </nav>

        <div class="sidebar-footer">
          <div class="user-block">
            <div class="user-avatar">A</div>
            <div class="user-info">
              <div class="user-name" id="sidebar-username">管理员</div>
              <div class="user-role">ADMIN</div>
            </div>
          </div>
          <button class="btn-icon" id="btn-logout" title="退出登录">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </aside>

      <!-- 右侧内容区 -->
      <main class="inner-content">
        <header class="content-header">
          <h1 class="page-title" id="breadcrumb-current">学院管理</h1>
        </header>

        <div class="content-body" id="page-content">
          <!-- 各页面内容渲染于此 -->
        </div>
      </main>
    </div>
  </div>

  <!-- 通用模态框 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title">标题</h3>
        <button class="btn-icon modal-close" id="modal-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer">
        <button class="btn btn-secondary" id="modal-cancel">取消</button>
        <button class="btn btn-primary" id="modal-confirm">确定</button>
      </div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div id="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/template-form.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
