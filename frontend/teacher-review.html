<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>论文生成系统 · 教师批阅</title>
  <style>
    :root{--ink:#20211f;--muted:#777872;--line:#e6e4df;--paper:#fff;--wash:#f5f4f0;--brand:#4f776a;--brand2:#e2ece7;--warn:#b57631;--danger:#a8544d;--blue:#536f91;--shadow:0 14px 38px rgba(41,42,38,.09)}
    *{box-sizing:border-box}body{margin:0;font:14px/1.6 Inter,"Microsoft YaHei",sans-serif;color:var(--ink);background:var(--wash)}button,input,textarea{font:inherit}button{cursor:pointer}
    .app{min-height:100vh;display:grid;grid-template-columns:230px 1fr}.side{background:#eff1ed;border-right:1px solid var(--line);padding:24px 16px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
    .brand{display:flex;gap:12px;align-items:center;padding:0 8px 26px}.mark{width:38px;height:38px;border-radius:10px;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:19px}.brand b{font-size:15px}.brand small{display:block;color:var(--muted)}
    nav button{width:100%;border:0;background:transparent;text-align:left;padding:11px 12px;border-radius:8px;color:#62655f;margin:3px 0}nav button.active{background:#dde5e0;color:#294b40;font-weight:700}.user{margin-top:auto;border-top:1px solid #dadcd7;padding:16px 8px 0;display:flex;gap:10px;align-items:center}.avatar{width:34px;height:34px;border-radius:50%;background:#d7b48d;display:grid;place-items:center;font-weight:bold}.user small{display:block;color:var(--muted)}
    main{min-width:0}.top{height:74px;background:rgba(255,255,255,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 30px;position:sticky;top:0;z-index:10}.top h1{font-size:20px;margin:0}.status{display:flex;gap:8px;align-items:center}.pill{padding:5px 10px;border-radius:999px;background:#eee;color:#666;font-size:12px;font-weight:700}.pill.submitted,.pill.reviewing{background:#e7edf5;color:#496582}.pill.returned{background:#f7eadc;color:#9b6428}.pill.graded{background:#e3eee9;color:#386858}.lock{color:var(--muted);font-size:12px}
    .view{padding:24px 30px 48px;max-width:1450px;margin:auto}.dashboard{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}.metric{background:#fff;border:1px solid var(--line);border-radius:12px;padding:17px 18px}.metric span{color:var(--muted);font-size:12px}.metric strong{display:block;font-size:26px;margin-top:4px}.panel{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 2px 7px rgba(0,0,0,.02)}
    .queue-head{display:flex;gap:10px;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line)}.queue-head input{width:250px;border:1px solid var(--line);padding:8px 11px;border-radius:8px}.paper-row{display:grid;grid-template-columns:1.5fr .7fr .7fr .7fr auto;gap:16px;align-items:center;padding:15px 18px;border-bottom:1px solid var(--line)}.paper-row:last-child{border:0}.paper-row small{display:block;color:var(--muted)}
    .btn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 13px;color:#454640}.btn:hover{background:#f4f5f2}.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}.btn.danger{color:var(--danger);border-color:#e7c7c3}.btn:disabled{opacity:.45;cursor:not-allowed}
    .review{display:grid;grid-template-columns:minmax(560px,1fr) 350px;gap:18px}.doc{padding:42px 56px;min-height:760px;box-shadow:var(--shadow)}.doc-meta{text-align:center;border-bottom:1px solid var(--line);padding-bottom:23px;margin-bottom:28px}.doc-meta h2{font-family:serif;font-size:25px;margin:0 0 8px}.doc-meta p{color:var(--muted);margin:0}.section{position:relative;padding:8px 12px;margin:0 -12px;border-radius:8px}.section:hover{background:#fafbf8}.section.selected{background:#f2f7f4;outline:2px solid #bad0c7}.section h3{font-family:serif;font-size:18px;margin:13px 0 8px}.section p{text-align:justify;text-indent:2em;margin:6px 0}.comment-pin{position:absolute;right:-38px;top:12px;width:26px;height:26px;border-radius:50%;border:0;background:#dfebe6;color:#356454;font-weight:bold}.comment-pin.has{background:var(--brand);color:#fff}.locked-note{border-left:3px solid var(--blue);background:#edf2f7;padding:10px 12px;margin-bottom:18px;color:#48617e}
    .review-side{display:flex;flex-direction:column;gap:14px}.box{background:#fff;border:1px solid var(--line);border-radius:12px;padding:17px}.box h3{font-size:14px;margin:0 0 13px}.hint{color:var(--muted);font-size:12px}.comment-list{display:flex;flex-direction:column;gap:8px;max-height:245px;overflow:auto}.comment{padding:10px;border-radius:8px;background:#f5f7f4;border-left:3px solid var(--brand)}.comment b{font-size:12px}.comment p{margin:4px 0}.comment small{color:var(--muted)}textarea{width:100%;min-height:78px;resize:vertical;border:1px solid var(--line);border-radius:8px;padding:9px}.field{margin:11px 0}.field label{display:block;color:var(--muted);font-size:12px;margin-bottom:5px}.scoreline{display:grid;grid-template-columns:1fr 85px;gap:8px}.scoreline input{width:100%;border:1px solid var(--line);border-radius:7px;padding:7px}.total{display:flex;justify-content:space-between;border-top:1px solid var(--line);padding-top:11px;margin-top:10px}.total strong{font-size:20px;color:var(--brand)}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .timeline{padding:18px}.event{display:grid;grid-template-columns:32px 1fr;gap:12px;position:relative;padding-bottom:21px}.event:before{content:"";position:absolute;left:15px;top:28px;bottom:0;border-left:1px solid var(--line)}.event:last-child:before{display:none}.dot{width:30px;height:30px;border-radius:50%;background:var(--brand2);color:var(--brand);display:grid;place-items:center;font-weight:bold}.event h4{margin:2px 0}.event p{margin:2px 0;color:var(--muted)}.event small{color:#999}.hidden{display:none!important}.empty{padding:60px;text-align:center;color:var(--muted)}.toast{position:fixed;right:24px;bottom:24px;background:#30322f;color:#fff;padding:11px 16px;border-radius:8px;box-shadow:var(--shadow);z-index:30}
    @media(max-width:1000px){.app{grid-template-columns:1fr}.side{display:none}.review{grid-template-columns:1fr}.dashboard{grid-template-columns:repeat(2,1fr)}.review-side{display:grid;grid-template-columns:1fr 1fr}.doc{padding:28px}.paper-row{grid-template-columns:1fr auto}.paper-row>span:nth-child(2),.paper-row>span:nth-child(3),.paper-row>span:nth-child(4){display:none}}
  </style>
</head>
<body>
<div class="app">
  <aside class="side"><div class="brand"><div class="mark">文</div><div><b>论文生成系统</b><small>教师批阅中心</small></div></div><div style="padding:0 4px 18px"><label style="display:block;color:var(--muted);font-size:11px;margin:0 0 6px 5px">切换系统角色</label><select id="roleSwitch" style="width:100%;padding:9px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)"><option value="index.html">管理员</option><option value="teacher-review.html" selected>教师</option><option value="student-placeholder.html">学生</option></select></div><nav><button data-page="queue" class="active">▦　待批阅论文</button><button data-page="review">✎　当前批阅</button><button data-page="history">◷　版本历史</button></nav><div class="user"><div class="avatar">陈</div><div><b>陈教授</b><small>指导教师 · TEACHER</small></div></div></aside>
  <main><header class="top"><h1 id="pageTitle">待批阅论文</h1><div class="status"><span id="statusPill" class="pill submitted">已提交 · 文档锁定</span><span class="lock">🔒 学生端不可编辑</span></div></header><div class="view">
    <section id="queuePage"><div class="dashboard"><div class="metric"><span>待批阅</span><strong id="mPending">1</strong></div><div class="metric"><span>已退回</span><strong id="mReturned">0</strong></div><div class="metric"><span>已评分</span><strong id="mGraded">0</strong></div><div class="metric"><span>本周批注</span><strong id="mComments">0</strong></div></div><div class="panel"><div class="queue-head"><b>课程论文提交列表</b><input id="search" placeholder="搜索学生或论文标题"></div><div id="paperList"></div></div></section>
    <section id="reviewPage" class="hidden"><div class="review"><article class="panel doc"><div id="lockNote" class="locked-note">该版本已由学生提交并锁定。批注会锚定到对应章节，教师不能直接改写学生原文。</div><div class="doc-meta"><h2>生成式人工智能在高校教学中的应用研究</h2><p>张明 · 2023110208　|　计算机科学与技术学院　|　课程论文</p></div><div id="documentBody"></div></article><aside class="review-side"><div class="box"><h3>定位批注</h3><p class="hint" id="selectionHint">点击论文段落或右侧圆点，选择批注位置。</p><textarea id="commentText" placeholder="输入针对该位置的评语或修改建议"></textarea><div class="actions"><button class="btn primary" id="addComment">添加批注</button></div><div class="comment-list" id="commentList"></div></div><div class="box"><h3>评分与总评</h3><div id="scoreFields"></div><div class="total"><span>总分 / 等级</span><strong><span id="totalScore">0</span> / <span id="grade">—</span></strong></div><div class="field"><label>教师总评</label><textarea id="overall" placeholder="总结论文优点、问题与修改方向"></textarea></div><div class="actions"><button class="btn" id="saveReview">保存批阅</button><button class="btn danger" id="returnPaper">退回修改</button><button class="btn primary" id="finalize">完成评分</button></div></div></aside></div></section>
    <section id="historyPage" class="hidden"><div class="panel"><div class="queue-head"><b>完整版本与操作留痕</b><button class="btn" id="simulateResubmit">模拟学生修订并重新提交</button></div><div class="timeline" id="timeline"></div></div></section>
  </div></main>
</div><div id="toast" class="toast hidden"></div>
<script>
const KEY='paper-review-demo-v2';
const defaults={status:'SUBMITTED',version:1,selected:'abstract',comments:[],scores:{structure:0,content:0,method:0,writing:0},overall:'',history:[{type:'提交',text:'学生提交论文 V1，系统自动锁定文档',time:'2026-07-20 09:30',version:1}]};
let state=Object.assign({},defaults,JSON.parse(localStorage.getItem(KEY)||'{}')); state.scores=Object.assign({},defaults.scores,state.scores||{}); state.comments=state.comments||[];state.history=state.history||defaults.history;
const sections=[['abstract','摘要','本文分析生成式人工智能在高校教学中的典型应用，从教学设计、学习支持和评价反馈三个维度讨论其价值。研究同时关注内容可信度、学术诚信和数据安全等风险，并提出以教师主导、人机协同为原则的治理路径。'],['intro','一、引言','大语言模型正在改变知识获取和内容生产方式。高校需要重新审视教学目标，将单纯的知识记忆转向问题定义、证据判断和创造性解决问题等高阶能力。'],['method','二、研究方法','研究采用文献分析与半结构化访谈方法，选取三所高校的教师和学生作为观察对象，对工具使用场景、学习成效以及潜在风险进行归纳编码。'],['findings','三、研究发现','结果表明，生成式人工智能能够提升备课效率、提供个性化解释并缩短形成性反馈周期；但若缺乏过程监管，学生可能产生依赖，并面临虚构引用和隐私泄露问题。'],['conclusion','四、结论与建议','高校应建立分级使用规范，明确可用、限用和禁用场景；课程评价应增加口头答辩、过程日志与版本追踪，使人工智能成为思维脚手架而非答案替代品。']];
const labels={SUBMITTED:['已提交 · 文档锁定','submitted'],REVIEWING:['批阅中 · 文档锁定','reviewing'],RETURNED:['已退回 · 等待修改','returned'],GRADED:['已评分 · 批阅完成','graded']};
function save(){localStorage.setItem(KEY,JSON.stringify(state));renderAll()}function now(){return new Date().toLocaleString('zh-CN',{hour12:false}).replaceAll('/','-')}function toast(t){let e=document.querySelector('#toast');e.textContent=t;e.classList.remove('hidden');setTimeout(()=>e.classList.add('hidden'),2200)}function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function renderAll(){let [text,cls]=labels[state.status];let pill=document.querySelector('#statusPill');pill.textContent=text;pill.className='pill '+cls;document.querySelector('.lock').textContent=state.status==='RETURNED'?'🔓 学生端可编辑':'🔒 学生端不可编辑';document.querySelector('#mPending').textContent=['SUBMITTED','REVIEWING'].includes(state.status)?1:0;document.querySelector('#mReturned').textContent=state.status==='RETURNED'?1:0;document.querySelector('#mGraded').textContent=state.status==='GRADED'?1:0;document.querySelector('#mComments').textContent=state.comments.length;renderQueue();renderDoc();renderComments();renderScores();renderTimeline()}
function renderQueue(){let q=document.querySelector('#search').value?.toLowerCase()||'';let show=('张明 生成式人工智能在高校教学中的应用研究').toLowerCase().includes(q);document.querySelector('#paperList').innerHTML=show?`<div class="paper-row"><div><b>生成式人工智能在高校教学中的应用研究</b><small>张明 · 2023110208 · 版本 V${state.version}</small></div><span>课程论文<small>论文类型</small></span><span>${state.comments.length} 条<small>定位批注</small></span><span>${document.querySelector('#totalScore')?.textContent||0} 分<small>当前评分</small></span><button class="btn primary" onclick="go('review')">进入批阅</button></div>`:'<div class="empty">没有匹配的论文</div>'}
function renderDoc(){document.querySelector('#documentBody').innerHTML=sections.map(([id,title,text])=>`<section class="section ${state.selected===id?'selected':''}" data-id="${id}"><button class="comment-pin ${state.comments.some(c=>c.section===id)?'has':''}" title="在此处添加批注">${state.comments.filter(c=>c.section===id).length||'+'}</button><h3>${title}</h3><p>${text}</p></section>`).join('');document.querySelectorAll('.section').forEach(e=>e.onclick=()=>{state.selected=e.dataset.id;save()});document.querySelector('#selectionHint').textContent='当前定位：'+sections.find(s=>s[0]===state.selected)[1];let disabled=state.status==='RETURNED'||state.status==='GRADED';document.querySelector('#addComment').disabled=disabled;document.querySelector('#saveReview').disabled=disabled;document.querySelector('#returnPaper').disabled=disabled;document.querySelector('#finalize').disabled=disabled;document.querySelector('#lockNote').textContent=state.status==='RETURNED'?'论文已退回学生修改，本版本批阅内容只读。':state.status==='GRADED'?'评分已归档，本版本批阅内容只读。':'该版本已由学生提交并锁定。批注会锚定到对应章节，教师不能直接改写学生原文。'}
function renderComments(){let e=document.querySelector('#commentList');e.innerHTML=state.comments.length?state.comments.map((c,i)=>`<div class="comment"><b>#${i+1} · ${sections.find(s=>s[0]===c.section)[1]}</b><p>${esc(c.text)}</p><small>${c.time} · V${c.version}</small></div>`).join(''):'<p class="hint">尚未添加批注</p>'}
const dims=[['structure','结构与逻辑',20],['content','内容与观点',35],['method','方法与论证',25],['writing','规范与表达',20]];
function renderScores(){document.querySelector('#scoreFields').innerHTML=dims.map(([k,n,max])=>`<div class="field scoreline"><label>${n}（${max}分）</label><input data-score="${k}" type="number" min="0" max="${max}" value="${state.scores[k]}" ${['RETURNED','GRADED'].includes(state.status)?'disabled':''}></div>`).join('');let total=Object.values(state.scores).reduce((a,b)=>a+(+b||0),0);document.querySelector('#totalScore').textContent=total;document.querySelector('#grade').textContent=total>=90?'A':total>=80?'B':total>=70?'C':total>=60?'D':total?'F':'—';document.querySelector('#overall').value=state.overall;document.querySelectorAll('[data-score]').forEach(e=>e.oninput=()=>{let max=+e.max;e.value=Math.max(0,Math.min(max,+e.value||0));state.scores[e.dataset.score]=+e.value;let t=Object.values(state.scores).reduce((a,b)=>a+(+b||0),0);document.querySelector('#totalScore').textContent=t;document.querySelector('#grade').textContent=t>=90?'A':t>=80?'B':t>=70?'C':t>=60?'D':t?'F':'—';renderQueue()})}
function renderTimeline(){document.querySelector('#timeline').innerHTML=[...state.history].reverse().map((h,i)=>`<div class="event"><div class="dot">${state.history.length-i}</div><div><h4>${esc(h.type)} · V${h.version}</h4><p>${esc(h.text)}</p><small>${h.time}</small></div></div>`).join('')}
function go(page){['queue','review','history'].forEach(p=>document.querySelector('#'+p+'Page').classList.toggle('hidden',p!==page));document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===page));document.querySelector('#pageTitle').textContent={queue:'待批阅论文',review:'论文批阅工作台',history:'版本历史记录'}[page]}
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>go(b.dataset.page));document.querySelector('#search').oninput=renderQueue;
document.querySelector('#roleSwitch').onchange=e=>location.href=e.target.value;
document.querySelector('#addComment').onclick=()=>{let t=document.querySelector('#commentText').value.trim();if(!t)return toast('请先输入批注内容');state.status='REVIEWING';state.comments.push({section:state.selected,text:t,time:now(),version:state.version});state.history.push({type:'批注',text:`教师在“${sections.find(s=>s[0]===state.selected)[1]}”添加定位批注`,time:now(),version:state.version});document.querySelector('#commentText').value='';save();toast('批注已添加到对应位置')};
document.querySelector('#saveReview').onclick=()=>{state.overall=document.querySelector('#overall').value.trim();state.status='REVIEWING';state.history.push({type:'保存批阅',text:'教师保存当前批注、评分与总评草稿',time:now(),version:state.version});save();toast('批阅进度已保存')};
document.querySelector('#returnPaper').onclick=()=>{state.overall=document.querySelector('#overall').value.trim();if(!state.comments.length&&!state.overall)return toast('退回前请至少填写一条修改意见');state.status='RETURNED';state.history.push({type:'退回修改',text:'教师退回论文，解除学生端锁定并保留本次批阅记录',time:now(),version:state.version});save();toast('论文已退回，学生可修改')};
document.querySelector('#finalize').onclick=()=>{let total=Object.values(state.scores).reduce((a,b)=>a+(+b||0),0);state.overall=document.querySelector('#overall').value.trim();if(!total||!state.overall)return toast('请完成评分并填写教师总评');state.status='GRADED';state.history.push({type:'完成评分',text:`教师完成终审，成绩 ${total} 分，批阅结果归档`,time:now(),version:state.version});save();toast('评分已完成并归档')};
document.querySelector('#simulateResubmit').onclick=()=>{if(state.status!=='RETURNED')return toast('仅退回状态可模拟学生重提');state.version++;state.status='SUBMITTED';state.scores={structure:0,content:0,method:0,writing:0};state.overall='';state.history.push({type:'重新提交',text:'学生根据意见完成修订并提交，系统生成新版本并再次锁定',time:now(),version:state.version});save();toast('V'+state.version+' 已提交并锁定')};
renderAll();
</script>
</body></html>
