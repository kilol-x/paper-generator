<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>论文生成系统 · 管理员</title>
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <div id="app">

    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">P</div>
        <span class="logo-text">论文管理系统</span>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-group-label">基础数据</div>
        <a class="nav-item" href="#/colleges" data-route="/colleges">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <span>学院管理</span>
        </a>

        <div class="nav-group-label">模板管理</div>
        <a class="nav-item" href="#/templates" data-route="/templates">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="9" y1="21" x2="9" y2="9"/>
          </svg>
          <span>模板列表</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-avatar">A</div>
        <div class="user-info">
          <div class="user-name" id="sidebar-username">管理员</div>
          <div class="user-role">ADMIN</div>
        </div>
        <button class="btn-icon logout-btn" id="btn-logout" title="退出登录">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- 主区域 -->
    <div class="main-wrapper">
      <header class="topbar">
        <div class="breadcrumb">
          <span class="breadcrumb-root">管理后台</span>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current" id="breadcrumb-current">学院管理</span>
        </div>
        <div class="topbar-right">
          <span class="topbar-username" id="topbar-username">管理员</span>
        </div>
      </header>

      <main class="content" id="page-content">
        <!-- 各页面内容渲染于此 -->
      </main>
    </div>
  </div>

  <!-- 通用模态框 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title">标题</h3>
        <button class="btn-icon modal-close" id="modal-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer">
        <button class="btn btn-secondary" id="modal-cancel">取消</button>
        <button class="btn btn-primary" id="modal-confirm">确定</button>
      </div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div id="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/template-form.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
